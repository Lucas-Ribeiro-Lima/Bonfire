version: '3.9'
services:
  bonfire-app:
    container_name: bonfire-app
    image: bonfire-app
    build:
      context: ./frontend/
    ports:
    - '7070:3000'
    networks:
    - network
    environment:
    - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    - NEXT_PUBLIC_API_PORT=${NEXT_PUBLIC_API_PORT}
    - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
    - NEXTAUTH_URL=${NEXTAUTH_URL}
    - BONFIRE_ID=${BONFIRE_ID}
    - BONFIRE_CLIENT_SECRET=${BONFIRE_CLIENT_SECRET}
    - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER}
    restart: unless-stopped

  bonfire-worker:
    container_name: bonfire-worker
    image: bonfire-worker
    build:
      context: ./backend/
    restart: always
    ports:
    - '5000:5000'
    networks:
    - network
    volumes:
      - ./bonfire-backend/Logs:/app/Logs

  db:
    container_name: bonfire-db
    image: mariadb
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQLB_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - ./db:/var/lib/mysql      
    networks:
      - network

  keycloak:
    container_name: keycloak-app
    image: quay.io/keycloak/keycloak:23.0.6
    command: start-dev
    restart: unless-stopped
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB_URL=jdbc:postgresql://keycloak_db:5432/keycloak
      - KC_DB=postgres
      - KC_DB_USERNAME=${KEYCLOAK_DB_USER}
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD}
    ports:
      - 5050:8080
    networks:
      - network

  keycloak_db:
    container_name: keycloak_db
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_PORT: 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - network

networks:
  network:
    driver: bridge
